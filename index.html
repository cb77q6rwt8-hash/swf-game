<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SWF Game</title>

<script>
const VERSION = "20260510-subfix-1";

// sub/ 内のSWF読み込みを root のSWFへ橋渡しするService Workerを登録
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js?v=" + VERSION).then(async () => {
    if (!navigator.serviceWorker.controller && !location.search.includes("swready=1")) {
      location.replace(location.pathname + "?swready=1&v=" + VERSION);
    }
  });
}

window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
  renderer: "canvas",
  autoplay: "on",
  scale: "showAll",
  letterbox: "on",
  splashScreen: false,
  unmuteOverlay: "hidden",
  allowScriptAccess: true,
  warnOnUnsupportedContent: true,
  contextMenu: "on",
  base: "./"
};
</script>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#wrap {
  width: 100vw;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

embed, object, ruffle-player {
  width: min(100vw, 100dvh);
  height: min(100vw, 100dvh);
  max-width: 600px;
  max-height: 600px;
  display: block;
}
</style>
</head>

<body>
<div id="wrap">
  <embed
    src="hand-to-hand-imouto.swf?v=20260510-subfix-1"
    type="application/x-shockwave-flash"
    width="600"
    height="600"
    allowscriptaccess="always">
</div>
</body>
</html>
