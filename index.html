<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SWF Game</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    embed {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <embed src="hand-to-hand-imouto.swf" width="800" height="600" />
  </div>
</body>
</html>
