<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SWF Game</title>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
  // iPhone Safariでタップ判定がずれる・効かない場合の対策
  renderer: "canvas",
  autoplay: "on",
  scale: "showAll",
  letterbox: "on",
  splashScreen: false,
  unmuteOverlay: "hidden",
  allowScriptAccess: true,
  warnOnUnsupportedContent: true,
  contextMenu: "on"
};
</script>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#wrap {
  width: 100vw;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

ruffle-player, object, embed {
  width: min(100vw, 100dvh);
  height: min(100vw, 100dvh);
  max-width: 600px;
  max-height: 600px;
  display: block;
  outline: none;
}
</style>
</head>
<body>
<div id="wrap">
  <object data="hand-to-hand-imouto.swf" type="application/x-shockwave-flash" width="600" height="600">
    <param name="movie" value="hand-to-hand-imouto.swf">
    <param name="allowScriptAccess" value="always">
    <param name="wmode" value="window">
  </object>
</div>
</body>
</html>
